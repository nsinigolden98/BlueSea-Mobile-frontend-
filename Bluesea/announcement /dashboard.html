<!DOCTYPE html>
<html>

<head>

<title>User Dashboard</title>

<style>

/* Dashboard base */

body{
margin:0;
font-family:Arial;
}

/* Transparent overlay */

.announcement-overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

/* transparent background */

background:transparent;

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;

}

/* Announcement card */

.announcement-box{

pointer-events:auto;

width:420px;

background:rgba(20,20,30,0.85);

backdrop-filter:blur(10px);

border-radius:14px;

box-shadow:0 20px 60px rgba(0,0,0,0.5);

overflow:hidden;

animation:popup 0.4s ease;

}

/* Animation */

@keyframes popup{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

/* Image banner */

.banner{

width:100%;
height:180px;
object-fit:cover;
display:none;

}

/* Content */

.content{
padding:22px;
color:white;
}

/* Category badge */

.category{
font-size:12px;
background:#3b82f6;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-bottom:10px;
}

/* Title */

.title{
font-size:20px;
margin-bottom:6px;
}

/* Message */

.message{
font-size:14px;
line-height:1.5;
white-space:pre-wrap;
}

/* Button */

button{
margin-top:15px;
padding:8px 16px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Dashboard Content</h1>

<p>Your normal dashboard goes here.</p>

<!-- Announcement -->

<div id="announcement" class="announcement-overlay" style="display:none">

<div class="announcement-box">

<img id="banner" class="banner">

<div class="content">

<div id="category" class="category"></div>

<div id="title" class="title"></div>

<div id="message" class="message"></div>

<button onclick="closeAnnouncement()">Close</button>

</div>

</div>

</div>

<script>

/* load announcement */

window.onload=function(){

const data=localStorage.getItem("siteAnnouncement")

if(!data) return

const announcement=JSON.parse(data)

const lastSeen=localStorage.getItem("announcementSeen")

const today=new Date().toDateString()

/* show only once per day */

if(lastSeen===today) return

document.getElementById("title").innerText=announcement.title
document.getElementById("message").innerText=announcement.message
document.getElementById("category").innerText=announcement.category

/* show image if available */

if(announcement.image){

const img=document.getElementById("banner")

img.src=announcement.image

img.style.display="block"

}

document.getElementById("announcement").style.display="flex"

}

/* close popup */

function closeAnnouncement(){

document.getElementById("announcement").style.display="none"

localStorage.setItem("announcementSeen",new Date().toDateString())

}

</script>

</body>

</html>
