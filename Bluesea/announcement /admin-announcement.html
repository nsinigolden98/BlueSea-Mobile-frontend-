<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Panel</title>

<style>

/* Page background */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f19;
color:white;
}

/* Layout container */

.admin-container{
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{

width:240px;

background:#05070d;

border-right:1px solid rgba(255,255,255,0.05);

transition:0.3s;

}

/* Sidebar collapsed */

.sidebar.collapsed{
width:70px;
}

/* Logo */

.logo{
padding:18px;
font-weight:bold;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* Menu items */

.menu-item{

padding:16px 20px;

cursor:pointer;

border-left:3px solid transparent;

}

.menu-item:hover{

background:#10162a;

border-left:3px solid #1e90ff;

}

/* Main content */

.content{

flex:1;

padding:40px;

}

/* Topbar */

.topbar{

display:flex;

align-items:center;

margin-bottom:25px;

}

/* Toggle button */

.toggle-btn{

background:#1e90ff;

border:none;

color:white;

padding:8px 14px;

border-radius:6px;

cursor:pointer;

}

/* Form container */

.form-box{

max-width:620px;

background:#10162a;

border-radius:12px;

padding:28px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);

}

/* Labels */

label{

font-size:13px;

opacity:0.8;

}

/* Inputs */

input,textarea,select{

width:100%;

padding:12px;

margin-top:6px;

margin-bottom:16px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.08);

background:#0b0f19;

color:white;

}

/* File upload */

input[type=file]{
background:#0b0f19;
}

/* Button */

button{

background:#1e90ff;

border:none;

color:white;

padding:12px 20px;

border-radius:8px;

cursor:pointer;

}

/* Success text */

.success{
margin-top:10px;
color:#7dffb1;
}

/* MOBILE STYLES */

@media(max-width:768px){

/* Sidebar becomes overlay */

.sidebar{

position:fixed;

left:-240px;

top:0;

height:100%;

z-index:1000;

}

/* Sidebar open */

.sidebar.open{
left:0;
}

/* Content spacing */

.content{
padding:20px;
}

/* Form box full width */

.form-box{
width:100%;
padding:22px;
}

}

</style>

</head>

<body>

<div class="admin-container">

<!-- Sidebar -->

<div id="sidebar" class="sidebar">

<div class="logo">
Admin
</div>

<div class="menu-item" onclick="showAnnouncement()">Upload Announcement</div>

<div class="menu-item">Upload Data Prices</div>

<div class="menu-item">Upload Live View Prices</div>

<div class="menu-item">Settings</div>

</div>

<!-- Main content -->

<div class="content">

<div class="topbar">

<button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>

</div>

<!-- Announcement form -->

<div id="announcementForm" class="form-box">

<h2>Upload Announcement</h2>

<label>Announcement Title</label>
<input id="title">

<label>Category</label>

<select id="category">
<option>Platform Update</option>
<option>New Feature</option>
<option>Coming Soon</option>
<option>Maintenance</option>
</select>

<label>Description</label>

<textarea id="message"></textarea>

<label>Image URL (optional)</label>
<input id="imageURL">

<label>Upload Image</label>
<input type="file" id="imageFile">

<button onclick="saveAnnouncement()">Publish Announcement</button>

<p class="success" id="success"></p>

</div>

</div>

</div>

<script>

/* Toggle sidebar for mobile */

function toggleSidebar(){

const sidebar=document.getElementById("sidebar")

sidebar.classList.toggle("open")

}

/* Show announcement form */

function showAnnouncement(){

document.getElementById("announcementForm").style.display="block"

}

/* Save announcement */

function saveAnnouncement(){

const title=document.getElementById("title").value
const category=document.getElementById("category").value
const message=document.getElementById("message").value
const imageURL=document.getElementById("imageURL").value

const file=document.getElementById("imageFile").files[0]

if(file){

const reader=new FileReader()

reader.onload=function(){

storeAnnouncement(reader.result)

}

reader.readAsDataURL(file)

}else{

storeAnnouncement(imageURL)

}

}

/* Store announcement */

function storeAnnouncement(image){

const announcement={

title:document.getElementById("title").value,

category:document.getElementById("category").value,

message:document.getElementById("message").value,

image:image,

date:new Date().toISOString()

}

/* Using localStorage for testing
   In production this will be sent to backend */

localStorage.setItem("siteAnnouncement",JSON.stringify(announcement))

document.getElementById("success").innerText="Announcement Published Successfully"

}

</script>

</body>

</html>
